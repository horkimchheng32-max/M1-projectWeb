<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TravelSet — Login</title>

  <!-- Tailwind CSS-->
 <link rel="stylesheet" href="../src/output.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
            serif: ['"DM Serif Display"', 'serif'],
          },
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.5.0/remixicon.min.css"/>
  

  <style>
    /* Gradient text — requires webkit, not possible with Tailwind alone */
    .gradient-text {
      background: linear-gradient(90deg, #3b82f6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    /* Slide-in animation for extra fields */
    .extra {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.35s ease, opacity 0.3s ease;
    }
    .extra.show {
      max-height: 90px;
      opacity: 1;
    }
    /* Custom focus ring for inputs */
    .custom-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
      background: #fff;
      outline: none;
    }
  </style>
</head>

<body class="font-poppins min-h-screen bg-[#f0f4ff] flex items-center justify-center p-4">

  <div class="w-full max-w-240 bg-white rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.08)] flex overflow-hidden min-h-145">

    <!-- ── Left: Form ── -->
    <div class="flex-1 px-10 py-12 flex flex-col min-w-0">

      <!-- Logo -->
      <a href="#" class="font-serif italic text-[2rem] gradient-text no-underline inline-block mb-8">TravelSet</a>

      <!-- Tab toggle -->
      <div class="flex bg-gray-100 rounded-xl p-1 mb-7">
        <button id="tabLogin" onclick="switchTab('login')"
          class="flex-1 py-2.5 rounded-[9px] text-sm font-medium cursor-pointer border-0 transition-all duration-200
                 bg-white text-gray-800 shadow-[0_2px_8px_rgba(0,0,0,0.08)]">
          Sign In
        </button>
        <button id="tabSignup" onclick="switchTab('signup')"
          class="flex-1 py-2.5 rounded-[9px] text-sm font-medium cursor-pointer border-0 transition-all duration-200
                 bg-transparent text-gray-400">
          Sign Up
        </button>
      </div>

      <!-- Heading -->
      <h1 id="formTitle" class="font-serif text-2xl text-gray-900 mb-1">Welcome back</h1>
      <p id="formSub" class="text-[0.8rem] text-gray-400 font-light mb-5">Sign in to continue your journey</p>

      <!-- Name field (signup only) -->
      <div class="extra" id="nameField">
        <div class="mb-3.5">
          <label class="block text-[0.72rem] font-semibold text-gray-500 mb-1 tracking-wide uppercase">Full Name</label>
          <div class="relative">
            <i class="ri-user-3-line absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 text-base pointer-events-none"></i>
            <input type="text" placeholder="Jane Doe"
              class="custom-input w-full h-11 pl-9 pr-10 border border-gray-200 rounded-[10px] bg-gray-50
                     font-poppins text-[0.85rem] text-gray-900 transition-all duration-200" />
          </div>
        </div>
      </div>

      <!-- Email -->
      <div class="mb-3.5">
        <label class="block text-[0.72rem] font-semibold text-gray-500 mb-1 tracking-wide uppercase">Email</label>
        <div class="relative">
          <i class="ri-mail-line absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 text-base pointer-events-none"></i>
          <input type="email" placeholder="you@example.com"
            class="custom-input w-full h-11 pl-9 pr-10 border border-gray-200 rounded-[10px] bg-gray-50
                   font-poppins text-[0.85rem] text-gray-900 transition-all duration-200" />
        </div>
      </div>

      <!-- Password -->
      <div class="mb-3.5">
        <label class="block text-[0.72rem] font-semibold text-gray-500 mb-1 tracking-wide uppercase">Password</label>
        <div class="relative">
          <i class="ri-lock-2-line absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 text-base pointer-events-none"></i>
          <input type="password" placeholder="••••••••" id="passwordInput"
            class="custom-input w-full h-11 pl-9 pr-10 border border-gray-200 rounded-[10px] bg-gray-50
                   font-poppins text-[0.85rem] text-gray-900 transition-all duration-200" />
          <button type="button" onclick="togglePass('passwordInput', this)" aria-label="Toggle password"
            class="absolute right-3 top-1/2 -translate-y-1/2 bg-transparent border-0 cursor-pointer
                   text-gray-400 text-base leading-none hover:text-blue-500 transition-colors duration-200 p-0">
            <i class="ri-eye-line"></i>
          </button>
        </div>
      </div>

      <!-- Confirm password (signup only) -->
      <div class="extra" id="confirmField">
        <div class="mb-3.5">
          <label class="block text-[0.72rem] font-semibold text-gray-500 mb-1 tracking-wide uppercase">Confirm Password</label>
          <div class="relative">
            <i class="ri-lock-2-line absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 text-base pointer-events-none"></i>
            <input type="password" placeholder="••••••••" id="confirmInput"
              class="custom-input w-full h-11 pl-9 pr-10 border border-gray-200 rounded-[10px] bg-gray-50
                     font-poppins text-[0.85rem] text-gray-900 transition-all duration-200" />
            <button type="button" onclick="togglePass('confirmInput', this)" aria-label="Toggle confirm password"
              class="absolute right-3 top-1/2 -translate-y-1/2 bg-transparent border-0 cursor-pointer
                     text-gray-400 text-base leading-none hover:text-blue-500 transition-colors duration-200 p-0">
              <i class="ri-eye-line"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- Forgot password -->
      <div id="forgotRow" class="text-right -mt-1 mb-3">
        <a href="#" class="text-[0.75rem] text-blue-500 no-underline hover:underline">Forgot password?</a>
      </div>

      <!-- Submit button -->
      <button id="submitBtn"
        class="w-full h-[46px] border-0 rounded-[10px] bg-gradient-to-r from-blue-500 to-indigo-500
               text-white font-poppins text-[0.9rem] font-semibold tracking-wide cursor-pointer mt-1
               hover:opacity-90 active:scale-[0.99] transition-all duration-200">
               <a href="../src/index.html"> Sign In</a>
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-2.5 my-4">
        <hr class="flex-1 border-t border-gray-100" />
        <span class="text-[0.72rem] text-gray-300 whitespace-nowrap">or continue with</span>
        <hr class="flex-1 border-t border-gray-100" />
      </div>

      <!-- Google button -->
      <button
        class="w-full h-11 border border-gray-200 rounded-[10px] bg-white flex items-center justify-center gap-2.5
               font-poppins text-[0.85rem] font-medium text-gray-700 cursor-pointer
               hover:bg-gray-50 hover:border-gray-300 transition-all duration-200">
        <svg width="18" height="18" viewBox="0 0 533.5 544.3" xmlns="http://www.w3.org/2000/svg">
          <path d="M533.5 278.4c0-18.5-1.5-37.1-4.7-55.3H272.1v104.8h147c-6.1 33.8-25.7 63.7-54.4 82.7v68h87.7c51.5-47.4 81.1-117.4 81.1-200.2z" fill="#4285f4"/>
          <path d="M272.1 544.3c73.4 0 135.3-24.1 180.4-65.7l-87.7-68c-24.4 16.6-55.9 26-92.6 26-71 0-131.2-47.9-152.8-112.3H28.9v70.1c46.2 91.9 140.3 149.9 243.2 149.9z" fill="#34a853"/>
          <path d="M119.3 324.3c-11.4-33.8-11.4-70.4 0-104.2V150H28.9c-38.6 76.9-38.6 167.5 0 244.4l90.4-70.1z" fill="#fbbc04"/>
          <path d="M272.1 107.7c38.8-.6 76.3 14 104.4 40.8l77.7-77.7C405 24.6 339.7-.8 272.1 0 169.2 0 75.1 58 28.9 150l90.4 70.1c21.5-64.5 81.8-112.4 152.8-112.4z" fill="#ea4335"/>
        </svg>
        Sign in with Google
      </button>

      <!-- Terms -->
      <p class="text-[0.7rem] text-gray-400 text-center mt-3.5 leading-relaxed">
        By continuing you agree to TravelSet's
        <a href="#" class="text-gray-500 border-b border-dotted border-gray-400 no-underline hover:text-blue-500">Terms of Service</a> and
        <a href="#" class="text-gray-500 border-b border-dotted border-gray-400 no-underline hover:text-blue-500">Privacy Policy</a>
      </p>
    </div>

    <!-- ── Right: Image ── -->
    <div class="hidden md:block flex-1 relative bg-cover bg-center"
         style="background-image: url('https://i.pinimg.com/1200x/7b/5f/25/7b5f2558a8f6d14300e3f7190dc18a67.jpg')">
      <div class="absolute inset-0 flex flex-col items-center justify-end p-10 text-center"
           style="background: linear-gradient(135deg, rgba(59,130,246,0.55), rgba(236,72,153,0.4))">
        <h2 class="font-serif text-white text-[1.75rem] font-normal leading-snug mb-2"
            style="text-shadow: 0 2px 12px rgba(0,0,0,0.25)">
          Explore the world,<br/>one trip at a time.
        </h2>
        <p class="text-white/80 text-[0.85rem] font-light">Plan, discover, and book your next adventure.</p>
      </div>
    </div>

  </div>

  <script src="../src/main.js"></script>

</body>
</html>
